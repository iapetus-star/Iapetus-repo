<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Escape Room Gone Wrong</title>

  <style>
    body {
      margin: 0;
      padding: 2rem;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55, #6a1b9a);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .container {
      background: #fffdf7;
      max-width: 850px;
      width: 100%;
      padding: 2rem;
      border-radius: 20px;
      border: 6px dashed #9c27b0;
      box-shadow: 0 15px 35px rgba(0,0,0,.35);
    }

    h1 {
      text-align: center;
      color: #6a1b9a;
      font-size: 2.5rem;
      margin-bottom: .5rem;
      text-shadow: 2px 2px #ddd;
    }

    .instructions {
      text-align: center;
      color: #555;
      margin-bottom: 2rem;
      font-size: 1.05rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    input[type="text"] {
      padding: .85rem;
      font-size: 1rem;
      border-radius: 8px;
      border: 2px solid #ce93d8;
      background: white;
      transition: .2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #9c27b0;
      box-shadow: 0 0 12px rgba(156,39,176,.45);
    }

    button {
      margin-top: 1rem;
      padding: .9rem;
      background: #6a1b9a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: .2s;
    }

    button:hover {
      background: #8e24aa;
      transform: scale(1.04);
    }

    .story {
      display: none;
      margin-top: 2rem;
      padding: 1.8rem;
      background: #f8efff;
      border-left: 8px solid #ce93d8;
      border-radius: 12px;
      line-height: 1.8;
      font-size: 1.1rem;
      box-shadow: inset 0 0 12px rgba(0,0,0,.1);
    }

    #tryAgainBtn {
      display: none;
      width: 100%;
      margin-top: 1.5rem;
      background: #4a148c;
    }

    #tryAgainBtn:hover {
      background: #6a1b9a;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>🔐 Escape Room Gone Wrong</h1>

  <form id="madLibForm">

    <p class="instructions">
      Enter your clues and see how badly your escape attempt goes!
    </p>

    <input type="text" name="team" placeholder="A Funny Team Name" required>
    <input type="text" name="nickname" placeholder="A Person's Silly Nickname" required>
    <input type="text" name="object" placeholder="A Strange Object" required>
    <input type="text" name="wrong" placeholder="A Ridiculous Thing Someone Does Instead of Solving the Puzzle" required>
    <input type="text" name="creature" placeholder="A Weird Creature or Character" required>
    <input type="text" name="password" placeholder="A Random Password" required>
    <input type="text" name="item" placeholder="A Silly Item" required>
    <input type="text" name="action" placeholder="A Dramatic Action" required>
    <input type="text" name="prize" placeholder="A Funny Prize" required>

    <button type="submit">🚪 Begin Escape Challenge!</button>

  </form>


  <div id="story" class="story"></div>


  <button id="tryAgainBtn">🔑 Try Another Escape Room</button>

</div>


<script>

const form = document.getElementById("madLibForm");
const storyDiv = document.getElementById("story");
const tryAgainBtn = document.getElementById("tryAgainBtn");


form.addEventListener("submit", function(e){

    e.preventDefault();

    const values = Object.fromEntries(new FormData(form).entries());

    form.style.display = "none";

    const rawStory = generateStory(values);

    storyDiv.innerHTML = formatStoryText(rawStory);

    storyDiv.style.display = "block";
    tryAgainBtn.style.display = "block";

});


tryAgainBtn.addEventListener("click", ()=>{

    form.reset();
    form.style.display = "flex";
    storyDiv.style.display = "none";
    tryAgainBtn.style.display = "none";

});


function generateStory(values){

const {
    team,
    nickname,
    object,
    wrong,
    creature,
    password,
    item,
    action,
    prize
} = values;


return `

Welcome to the world-famous escape room challenge! Today’s brave team, ${team}, entered the mysterious room hoping to win fame, glory, and possibly a coupon for free snacks.

The team’s leader, ${nickname}, confidently announced, "This will be easy!" But five minutes later, they discovered a strange object hidden behind a secret door: ${object}.

Instead of solving the first puzzle, the team decided the best strategy was to ${wrong}. Unfortunately, this attracted the attention of a suspicious creature known as ${creature}, who demanded that the team reveal the secret password: ${password}.

After a very confusing argument, the team discovered the only way out was to find the legendary escape item: ${item}. With only seconds left on the clock, one team member dramatically decided to ${action}, causing the entire room to shake.

The doors finally opened, and the team escaped! As a reward for their bravery and questionable decision-making, they received the ultimate prize: ${prize}.

The escape room owners immediately changed the rules for future visitors: "Please solve the puzzles… and please stop befriending the furniture." 🔐

`;

}


function formatStoryText(story){
    return "<p>" + story.trim().replace(/\n/g,"</p><p>") + "</p>";
}

</script>

</body>
</html>
```
