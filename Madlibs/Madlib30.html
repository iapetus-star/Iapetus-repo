<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Fortune Cookie That Came True</title>

  <style>
    body {
      margin: 0;
      padding: 2rem;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background: linear-gradient(135deg, #ffcc70, #ff8177, #c850c0);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .container {
      background: #fffaf0;
      max-width: 900px;
      width: 100%;
      padding: 2rem;
      border-radius: 20px;
      border: 6px dashed #d2691e;
      box-shadow: 0 15px 35px rgba(0,0,0,.3);
    }

    h1 {
      text-align: center;
      color: #b45309;
      font-size: 2.5rem;
      margin-bottom: .5rem;
    }

    .instructions {
      text-align: center;
      color: #666;
      margin-bottom: 2rem;
      font-size: 1.05rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    input[type="text"] {
      padding: .85rem;
      font-size: 1rem;
      border-radius: 8px;
      border: 2px solid #f4a261;
      background: white;
      transition: .2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #e76f51;
      box-shadow: 0 0 12px rgba(231,111,81,.45);
    }

    button {
      margin-top: 1rem;
      padding: .9rem;
      background: #b45309;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: .2s;
    }

    button:hover {
      background: #d97706;
      transform: scale(1.04);
    }

    .story {
      display: none;
      margin-top: 2rem;
      padding: 1.8rem;
      background: #fff3cd;
      border-left: 8px solid #f4a261;
      border-radius: 12px;
      font-size: 1.1rem;
      line-height: 1.8;
      box-shadow: inset 0 0 12px rgba(0,0,0,.1);
    }

    #tryAgainBtn {
      display: none;
      width: 100%;
      margin-top: 1.5rem;
      background: #c2410c;
    }

    #tryAgainBtn:hover {
      background: #ea580c;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>The Fortune Cookie That Came True ✨</h1>

  <form id="madLibForm">

    <p class="instructions">
      Fill in the fortunes and discover your unbelievable cookie prophecy!
    </p>

    <input type="text" name="person" placeholder="A Person's Name" required>
    <input type="text" name="animal" placeholder="A Silly Animal" required>
    <input type="text" name="adjective" placeholder="A Funny Adjective" required>
    <input type="text" name="food" placeholder="A Food" required>
    <input type="text" name="verb" placeholder="A Verb Ending in -ing" required>
    <input type="text" name="place" placeholder="A Place" required>
    <input type="text" name="number" placeholder="A Number" required>
    <input type="text" name="object" placeholder="A Weird Object" required>
    <input type="text" name="celebrity" placeholder="A Celebrity Name" required>
    <input type="text" name="bodypart" placeholder="A Body Part" required>
    <input type="text" name="job" placeholder="A Ridiculous Job Title" required>

    <button type="submit">🥠 Reveal My Fortune!</button>

  </form>


  <div id="story" class="story"></div>


  <button id="tryAgainBtn">🔮 Open Another Fortune Cookie</button>

</div>


<script>

const form = document.getElementById("madLibForm");
const storyDiv = document.getElementById("story");
const tryAgainBtn = document.getElementById("tryAgainBtn");


form.addEventListener("submit", function(e){

    e.preventDefault();

    const values = Object.fromEntries(new FormData(form).entries());

    form.style.display = "none";

    const rawStory = generateStory(values);

    storyDiv.innerHTML = formatStoryText(rawStory);

    storyDiv.style.display = "block";
    tryAgainBtn.style.display = "block";

});


tryAgainBtn.addEventListener("click", ()=>{

    form.reset();
    form.style.display = "flex";
    storyDiv.style.display = "none";
    tryAgainBtn.style.display = "none";

});


function generateStory(values){

const {
    person,
    animal,
    adjective,
    food,
    verb,
    place,
    number,
    object,
    celebrity,
    bodypart,
    job
} = values;


return `

One rainy afternoon, ${person} walked into a tiny restaurant called "The Extremely Questionable Noodle Palace." After finishing a plate of ${food}, they cracked open a fortune cookie that said:

"Tomorrow, you will discover that your life is about to become very ${adjective}."

At first, ${person} laughed and thought, "Sure, and I’m also going to find a ${object} hidden under my couch."

But the next morning, something unbelievable happened. A ${animal} wearing sunglasses appeared outside their house and announced that ${person} had been chosen for a very important mission: ${verb} all the way to ${place} to find the legendary treasure of the ${job}.

The only problem? The treasure was protected by a giant robot who demanded ${number} silly dances before letting anyone pass.

Luckily, ${person} defeated the robot by waving a ${object} and shouting the secret password: "${celebrity}!"

The treasure turned out to be a magical fortune cookie that granted one wish. Without hesitation, ${person} wished for the ability to control ${bodypart} whenever they wanted.

From that day forward, everyone knew ${person} as the world’s greatest ${job}. The strangest part? Every fortune cookie they opened came true… except the one that said they would become normal. 🥠✨

`;

}


function formatStoryText(story){
    return "<p>" + story.trim().replace(/\n/g,"</p><p>") + "</p>";
}

</script>

</body>
</html>
